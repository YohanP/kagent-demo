# ApplicationSet to automatically discover and deploy apps in the /apps folder
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-applicationset
  namespace: argocd
spec:
  generators:
    - git:
        # REPLACE with your actual repository URL after pushing
        repoURL: 'https://github.com/YohanP/kagent-demo.git'
        revision: HEAD
        directories:
          - path: gitops/*
  template:
    metadata:
      # The app name will be the folder name (e.g., guestbook-rust)
      name: '{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/YohanP/kagent-demo.git'
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        # The app will be deployed in a namespace named after the folder
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true